<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brain — Knowledge Graph</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0f19;
      --bg-panel: rgba(13, 17, 28, 0.94);
      --bg-hover: rgba(255,255,255,0.04);
      --border: rgba(80, 120, 180, 0.12);
      --border-focus: rgba(80, 160, 220, 0.35);
      --text: #c0cee0;
      --text-dim: #4a5a74;
      --text-muted: #2d3a50;
      --accent: #3d8ecf;

      --c-decision: #00d4e8;
      --c-bug: #f04060;
      --c-implementation: #00d68f;
      --c-pattern: #a855f7;
      --c-plan: #f0b020;
      --c-lesson: #f472b6;

      --font-ui: 'Outfit', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;

      --panel-w: 380px;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      overflow: hidden;
      cursor: crosshair;
    }

    /* ── Grain overlay ── */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 9999;
      pointer-events: none;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    canvas#graph {
      display: block;
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    /* ── Ambient light gradient ── */
    #ambient {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 60% 50% at 50% 50%, rgba(30,60,100,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 20% 80%, rgba(0,212,232,0.03) 0%, transparent 60%),
        radial-gradient(ellipse 35% 40% at 85% 20%, rgba(168,85,247,0.025) 0%, transparent 55%);
    }

    /* ── Glass panel base ── */
    .panel {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    /* ── Top bar ── */
    #topbar {
      position: fixed; top: 14px; left: 14px; right: 14px;
      z-index: 100;
      display: flex; align-items: center; gap: 10px;
      padding: 6px 10px;
      pointer-events: none;
    }
    #topbar > * { pointer-events: auto; }

    .logo {
      font-family: var(--font-mono);
      font-weight: 600; font-size: 12px;
      letter-spacing: 1.5px;
      color: var(--accent);
      padding: 0 8px;
      white-space: nowrap;
      text-transform: uppercase;
    }
    .logo span { color: var(--text-dim); font-weight: 300; }

    /* ── Search ── */
    #search-wrap {
      position: relative;
      flex: 0 1 280px;
    }
    #search {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 7px 12px 7px 32px;
      font-family: var(--font-mono);
      font-size: 12px; font-weight: 300;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    #search::placeholder { color: var(--text-dim); }
    #search:focus { border-color: var(--border-focus); background: rgba(255,255,255,0.06); }
    .search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: var(--text-dim); font-size: 13px; pointer-events: none;
    }
    .search-kbd {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      font-family: var(--font-mono); font-size: 9px; color: var(--text-muted);
      border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px;
      pointer-events: none;
    }
    #search-results {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      max-height: 300px; overflow-y: auto;
      display: none; z-index: 110;
    }
    #search-results.open { display: block; }
    .sr-item {
      padding: 8px 12px;
      font-size: 12px; cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: background 0.12s;
      display: flex; align-items: center; gap: 8px;
    }
    .sr-item:hover { background: var(--bg-hover); }
    .sr-item:last-child { border-bottom: none; }
    .sr-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    .sr-id { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); }
    .sr-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Type filters ── */
    #filters {
      display: flex; gap: 2px; margin-left: auto;
    }
    .filter-btn {
      display: flex; align-items: center; gap: 5px;
      background: none; border: 1px solid transparent;
      border-radius: 6px; padding: 5px 10px;
      font-family: var(--font-mono); font-size: 10px; font-weight: 400;
      color: var(--text-dim); cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .filter-btn.active { color: var(--text); border-color: var(--border); }
    .filter-btn:hover { background: var(--bg-hover); }
    .filter-btn .dot {
      width: 7px; height: 7px; border-radius: 50%;
      transition: opacity 0.15s;
    }
    .filter-btn:not(.active) .dot { opacity: 0.25; }
    .filter-btn .count {
      font-size: 9px; color: var(--text-muted); margin-left: 2px;
    }

    /* ── Action buttons ── */
    #actions {
      display: flex; gap: 4px;
    }
    .act-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 10px;
      font-family: var(--font-mono); font-size: 10px;
      color: var(--text-dim); cursor: pointer;
      transition: all 0.15s;
    }
    .act-btn:hover { background: var(--bg-hover); color: var(--text); border-color: var(--border-focus); }

    /* ── Detail panel ── */
    #detail {
      position: fixed; top: 60px; right: -420px; width: var(--panel-w);
      max-height: calc(100vh - 76px);
      overflow-y: auto; z-index: 100;
      padding: 18px;
      transition: right 0.35s var(--ease);
    }
    #detail.open { right: 14px; }
    #detail::-webkit-scrollbar { width: 3px; }
    #detail::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .d-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 14px;
    }
    .d-type-badge {
      font-family: var(--font-mono); font-size: 10px; font-weight: 500;
      letter-spacing: 1px; text-transform: uppercase;
      padding: 3px 8px; border-radius: 4px;
      border: 1px solid;
    }
    .d-close {
      background: none; border: 1px solid var(--border);
      color: var(--text-dim); font-size: 14px;
      width: 26px; height: 26px;
      border-radius: 5px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      font-family: var(--font-mono);
    }
    .d-close:hover { border-color: var(--border-focus); color: var(--text); }
    .d-title {
      font-size: 15px; font-weight: 500; line-height: 1.5;
      margin-bottom: 6px;
    }
    .d-id {
      font-family: var(--font-mono); font-size: 11px;
      color: var(--text-dim); margin-bottom: 12px;
    }
    .d-meta {
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px;
    }
    .d-chip {
      font-family: var(--font-mono); font-size: 9px;
      padding: 2px 8px; border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .d-section {
      font-family: var(--font-mono); font-size: 9px;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--text-muted); margin: 16px 0 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .d-file {
      font-family: var(--font-mono); font-size: 11px;
      color: var(--text-dim); padding: 2px 0;
      display: flex; align-items: center; gap: 6px;
    }
    .d-file::before { content: ''; width: 3px; height: 3px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; }
    .d-conn {
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      display: flex; align-items: center; gap: 8px;
      cursor: pointer;
      transition: background 0.12s;
      border-radius: 4px;
      padding: 6px 8px;
      margin: 0 -8px;
    }
    .d-conn:hover { background: var(--bg-hover); }
    .d-conn-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .d-conn-rel {
      font-family: var(--font-mono); font-size: 9px;
      color: var(--text-muted); letter-spacing: 0.3px; min-width: 70px;
    }
    .d-conn-name { font-size: 12px; color: var(--text-dim); }
    .d-stale-warn {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--c-plan);
      margin-bottom: 10px;
      padding: 6px 10px;
      border-radius: 5px;
      border: 1px solid rgba(240,176,32,0.2);
      background: rgba(240,176,32,0.05);
    }

    /* ── Minimap ── */
    #minimap {
      position: fixed; bottom: 80px; right: 14px;
      width: 160px; height: 120px;
      z-index: 90;
      overflow: hidden;
      cursor: pointer;
    }
    #minimap canvas {
      width: 100%; height: 100%;
    }
    .minimap-viewport {
      position: absolute;
      border: 1px solid rgba(61,142,207,0.4);
      background: rgba(61,142,207,0.05);
      pointer-events: none;
    }

    /* ── Timeline ── */
    #timeline {
      position: fixed; bottom: 14px; left: 14px; right: 14px;
      z-index: 90;
      padding: 8px 16px 10px;
      display: flex; flex-direction: column;
    }
    .tl-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 5px;
    }
    .tl-label {
      font-family: var(--font-mono); font-size: 9px;
      letter-spacing: 1.5px; color: var(--text-muted);
      text-transform: uppercase;
    }
    .tl-range {
      font-family: var(--font-mono); font-size: 9px; color: var(--text-muted);
    }
    .tl-track {
      position: relative; width: 100%; height: 20px;
    }
    .tl-dot {
      position: absolute; width: 5px; height: 5px; border-radius: 50%;
      top: 50%; cursor: pointer;
      transition: transform 0.12s;
      transform: translate(-50%, -50%);
    }
    .tl-dot:hover { transform: translate(-50%, -50%) scale(2.8); z-index: 2; }
    .tl-line {
      position: absolute; top: 50%; left: 0; right: 0;
      height: 1px; background: rgba(255,255,255,0.05);
    }

    /* ── Stats overlay ── */
    #stats {
      position: fixed; bottom: 80px; left: 14px;
      z-index: 90; padding: 12px 16px;
      min-width: 180px;
    }
    .st-title {
      font-family: var(--font-mono); font-size: 9px;
      letter-spacing: 1.5px; color: var(--text-muted);
      text-transform: uppercase; margin-bottom: 8px;
    }
    .st-row {
      display: flex; justify-content: space-between;
      font-size: 12px; margin-bottom: 2px;
    }
    .st-val { font-family: var(--font-mono); font-weight: 500; }
    .st-label { color: var(--text-dim); font-size: 11px; }
    .st-health {
      margin-top: 8px; padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    .st-bar-track {
      width: 100%; height: 3px; border-radius: 2px;
      background: rgba(255,255,255,0.04); overflow: hidden;
      margin-top: 4px;
    }
    .st-bar { height: 100%; border-radius: 2px; transition: width 0.5s var(--ease); }

    /* ── Cluster labels ── */
    .cluster-label {
      position: fixed; pointer-events: none; z-index: 5;
      font-family: var(--font-mono); font-size: 9px;
      letter-spacing: 2px; text-transform: uppercase;
      opacity: 0.12;
      transition: opacity 0.3s;
    }

    /* ── Controls hint ── */
    #controls-hint {
      position: fixed; bottom: 62px; left: 50%; transform: translateX(-50%);
      z-index: 80;
      font-family: var(--font-mono); font-size: 9px;
      color: var(--text-muted); opacity: 0.4;
      pointer-events: none;
      white-space: nowrap;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Animations ── */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.4s var(--ease) both; }
  </style>
</head>
<body>
  <div id="ambient"></div>
  <canvas id="graph"></canvas>

  <!-- Top bar -->
  <div id="topbar">
    <div class="logo">Brain<span> Graph</span></div>
    <div id="search-wrap">
      <span class="search-icon">&#9906;</span>
      <input id="search" type="text" placeholder="Search entries..." autocomplete="off" spellcheck="false">
      <span class="search-kbd">Ctrl+F</span>
      <div id="search-results" class="panel"></div>
    </div>
    <div id="filters"></div>
    <div id="actions">
      <button class="act-btn" id="btn-export" title="Export as PNG">PNG</button>
      <button class="act-btn" id="btn-reset" title="Reset view">Reset</button>
    </div>
  </div>

  <!-- Detail panel -->
  <div id="detail" class="panel"></div>

  <!-- Minimap -->
  <div id="minimap" class="panel">
    <canvas id="minimap-canvas"></canvas>
  </div>

  <!-- Stats -->
  <div id="stats" class="panel fade-in"></div>

  <!-- Timeline -->
  <div id="timeline" class="panel fade-in"></div>

  <!-- Controls hint -->
  <div id="controls-hint">Scroll zoom · Drag pan · Click select · Double-click focus · Esc deselect · Ctrl+F search</div>

  <script>
  (function() {
    'use strict';

    // ═══════════════════════════════════════════
    //  CONSTANTS
    // ═══════════════════════════════════════════

    const TYPE_COLORS = {
      decision: '#00d4e8', bug: '#f04060', implementation: '#00d68f',
      pattern: '#a855f7', plan: '#f0b020', lesson: '#f472b6'
    };
    const TYPE_LABELS = {
      decision: 'Decisions', bug: 'Bugs', implementation: 'Implementations',
      pattern: 'Patterns', plan: 'Plans', lesson: 'Lessons'
    };
    const TYPE_SHORT = {
      decision: 'DEC', bug: 'BUG', implementation: 'IMPL',
      pattern: 'PAT', plan: 'PLAN', lesson: 'LES'
    };
    const REL_STYLES = {
      implements:   { dash: null,    color: '#00d68f', width: 1.2, label: 'implements' },
      supersedes:   { dash: [6,4],   color: '#cc5500', width: 1.4, label: 'supersedes' },
      superseded_by:{ dash: [6,4],   color: '#cc5500', width: 1.0, label: 'superseded by' },
      fixes:        { dash: [3,3],   color: '#f0b020', width: 1.2, label: 'fixes' },
      caused_by:    { dash: [8,3,2,3],color:'#cc7700', width: 1.0, label: 'caused by' },
      used_in:      { dash: null,    color: '#3377cc', width: 0.8, label: 'used in' },
      relates_to:   { dash: [2,3],   color: '#4a5a74', width: 0.6, label: 'relates to' }
    };
    const STATUS_OPACITY = {
      active: 1, current: 1, open: 1,
      fixed: 0.7, 'wont-fix': 0.45, workaround: 0.6,
      superseded: 0.3, abandoned: 0.25,
      planned: 0.85, in_progress: 0.9, partial: 0.75, completed: 0.55
    };

    // Physics
    const REPULSION = 1800;
    const LINK_STRENGTH = 0.008;
    const LINK_DISTANCE = 120;
    const CENTER_GRAVITY = 0.01;
    const DAMPING = 0.88;
    const MIN_ALPHA = 0.001;
    const VELOCITY_LIMIT = 8;

    // Rendering
    const NODE_BASE_RADIUS = 5;
    const NODE_CONN_SCALE = 1.8;
    const NODE_MAX_RADIUS = 22;
    const LABEL_FONT_SIZE = 10;
    const PARTICLE_COUNT_PER_LINK = 1;
    const PARTICLE_SPEED = 0.003;
    const STALE_RING_EXTRA = 4;

    // ═══════════════════════════════════════════
    //  STATE
    // ═══════════════════════════════════════════

    let graphData = null;
    let nodes = [];
    let links = [];
    let particles = [];
    let activeTypes = new Set(Object.keys(TYPE_COLORS));

    let selectedNode = null;
    let hoverNode = null;
    let highlightSet = new Set();
    let searchQuery = '';

    // Canvas & viewport
    const canvas = document.getElementById('graph');
    const ctx = canvas.getContext('2d');
    let W, H, dpr;
    let panX = 0, panY = 0, zoom = 1;
    let targetZoom = 1, targetPanX = 0, targetPanY = 0;
    let smoothing = false;

    // Interaction state
    let isDragging = false;
    let dragNode = null;
    let dragStart = null;
    let isPanning = false;
    let panStart = null;
    let spaceDown = false;
    let dragMoved = false;

    // Simulation
    let simAlpha = 1;
    let animFrame = null;

    // ═══════════════════════════════════════════
    //  DATA LOADING
    // ═══════════════════════════════════════════

    async function loadData() {
      const res = await fetch('/api/graph');
      graphData = await res.json();

      nodes = graphData.nodes.map((n, i) => ({
        ...n,
        x: (Math.random() - 0.5) * 400,
        y: (Math.random() - 0.5) * 400,
        vx: 0, vy: 0,
        radius: Math.min(NODE_MAX_RADIUS, NODE_BASE_RADIUS + (n.connectionCount || 0) * NODE_CONN_SCALE),
        opacity: STATUS_OPACITY[n.status] || 0.8,
        pinned: false
      }));

      const nodeMap = new Map(nodes.map(n => [n.id, n]));

      links = graphData.links.map(l => ({
        source: nodeMap.get(l.source),
        target: nodeMap.get(l.target),
        relType: l.relType
      })).filter(l => l.source && l.target);

      // Create particles along links
      particles = [];
      for (const link of links) {
        for (let i = 0; i < PARTICLE_COUNT_PER_LINK; i++) {
          particles.push({
            link,
            t: Math.random(),
            speed: PARTICLE_SPEED + Math.random() * 0.002
          });
        }
      }

      buildUI();
      simAlpha = 1;
    }

    // ═══════════════════════════════════════════
    //  FORCE SIMULATION
    // ═══════════════════════════════════════════

    function simulate() {
      if (simAlpha < MIN_ALPHA) return;

      const visible = nodes.filter(n => activeTypes.has(n.type));
      const N = visible.length;

      // Repulsion (Barnes-Hut would be better for 500+ but direct is fine for <1000)
      for (let i = 0; i < N; i++) {
        for (let j = i + 1; j < N; j++) {
          const a = visible[i], b = visible[j];
          let dx = b.x - a.x, dy = b.y - a.y;
          let d2 = dx * dx + dy * dy;
          if (d2 < 1) d2 = 1;
          const d = Math.sqrt(d2);
          const f = REPULSION / d2 * simAlpha;
          const fx = (dx / d) * f, fy = (dy / d) * f;
          if (!a.pinned) { a.vx -= fx; a.vy -= fy; }
          if (!b.pinned) { b.vx += fx; b.vy += fy; }
        }
      }

      // Link attraction
      for (const link of links) {
        if (!activeTypes.has(link.source.type) || !activeTypes.has(link.target.type)) continue;
        const dx = link.target.x - link.source.x;
        const dy = link.target.y - link.source.y;
        const d = Math.sqrt(dx * dx + dy * dy) || 1;
        const f = (d - LINK_DISTANCE) * LINK_STRENGTH * simAlpha;
        const fx = (dx / d) * f, fy = (dy / d) * f;
        if (!link.source.pinned) { link.source.vx += fx; link.source.vy += fy; }
        if (!link.target.pinned) { link.target.vx -= fx; link.target.vy -= fy; }
      }

      // Center gravity
      for (const n of visible) {
        if (n.pinned) continue;
        n.vx -= n.x * CENTER_GRAVITY * simAlpha;
        n.vy -= n.y * CENTER_GRAVITY * simAlpha;
      }

      // Integrate
      for (const n of visible) {
        if (n.pinned) continue;
        n.vx *= DAMPING;
        n.vy *= DAMPING;
        // Clamp velocity
        const v = Math.sqrt(n.vx * n.vx + n.vy * n.vy);
        if (v > VELOCITY_LIMIT) { n.vx = (n.vx / v) * VELOCITY_LIMIT; n.vy = (n.vy / v) * VELOCITY_LIMIT; }
        n.x += n.vx;
        n.y += n.vy;
      }

      simAlpha *= 0.997;
    }

    // ═══════════════════════════════════════════
    //  RENDERING
    // ═══════════════════════════════════════════

    function worldToScreen(x, y) {
      return [(x - panX) * zoom + W / 2, (y - panY) * zoom + H / 2];
    }
    function screenToWorld(sx, sy) {
      return [(sx - W / 2) / zoom + panX, (sy - H / 2) / zoom + panY];
    }

    let _time = 0;

    function render() {
      _time += 0.016;

      // Smooth viewport transitions
      if (smoothing) {
        panX += (targetPanX - panX) * 0.08;
        panY += (targetPanY - panY) * 0.08;
        zoom += (targetZoom - zoom) * 0.08;
        if (Math.abs(panX - targetPanX) < 0.5 && Math.abs(panY - targetPanY) < 0.5 && Math.abs(zoom - targetZoom) < 0.001) {
          panX = targetPanX; panY = targetPanY; zoom = targetZoom;
          smoothing = false;
        }
      }

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, W, H);

      const hasHighlight = highlightSet.size > 0;

      // ── Draw links ──
      for (const link of links) {
        if (!activeTypes.has(link.source.type) || !activeTypes.has(link.target.type)) continue;
        const [x1, y1] = worldToScreen(link.source.x, link.source.y);
        const [x2, y2] = worldToScreen(link.target.x, link.target.y);

        // Culling
        if (x1 < -100 && x2 < -100) continue;
        if (x1 > W + 100 && x2 > W + 100) continue;
        if (y1 < -100 && y2 < -100) continue;
        if (y1 > H + 100 && y2 > H + 100) continue;

        const style = REL_STYLES[link.relType] || REL_STYLES.relates_to;
        const highlighted = hasHighlight && highlightSet.has(link.source.id) && highlightSet.has(link.target.id);
        const dimmed = hasHighlight && !highlighted;

        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.strokeStyle = style.color;
        ctx.globalAlpha = dimmed ? 0.03 : (highlighted ? 0.5 : 0.12);
        ctx.lineWidth = style.width * (highlighted ? 1.5 : 1) * zoom;
        if (style.dash) { ctx.setLineDash(style.dash.map(d => d * zoom)); } else { ctx.setLineDash([]); }
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.globalAlpha = 1;
      }

      // ── Draw particles ──
      for (const p of particles) {
        if (!activeTypes.has(p.link.source.type) || !activeTypes.has(p.link.target.type)) continue;
        if (hasHighlight && !(highlightSet.has(p.link.source.id) && highlightSet.has(p.link.target.id))) continue;
        p.t = (p.t + p.speed) % 1;
        const x = p.link.source.x + (p.link.target.x - p.link.source.x) * p.t;
        const y = p.link.source.y + (p.link.target.y - p.link.source.y) * p.t;
        const [sx, sy] = worldToScreen(x, y);
        if (sx < -20 || sx > W + 20 || sy < -20 || sy > H + 20) continue;

        const style = REL_STYLES[p.link.relType] || REL_STYLES.relates_to;
        const sz = 1.5 * zoom;
        ctx.beginPath();
        ctx.arc(sx, sy, sz, 0, Math.PI * 2);
        ctx.fillStyle = style.color;
        ctx.globalAlpha = 0.6;
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      // ── Draw nodes ──
      const sortedNodes = [...nodes].sort((a, b) => {
        // Draw selected/hovered last (on top)
        if (a === selectedNode || a === hoverNode) return 1;
        if (b === selectedNode || b === hoverNode) return -1;
        return 0;
      });

      for (const node of sortedNodes) {
        if (!activeTypes.has(node.type)) continue;
        const [sx, sy] = worldToScreen(node.x, node.y);
        if (sx < -50 || sx > W + 50 || sy < -50 || sy > H + 50) continue;

        const r = node.radius * zoom;
        const color = TYPE_COLORS[node.type] || '#ffffff';
        const isSelected = node === selectedNode;
        const isHovered = node === hoverNode;
        const isHighlighted = !hasHighlight || highlightSet.has(node.id);
        const isSearchMatch = searchQuery && node.name.toLowerCase().includes(searchQuery.toLowerCase());

        let alpha = node.opacity;
        if (hasHighlight && !isHighlighted) alpha = 0.06;
        if (isSearchMatch && searchQuery) alpha = 1;

        // Stale ring
        if (node.isStale && isHighlighted) {
          ctx.beginPath();
          ctx.arc(sx, sy, r + STALE_RING_EXTRA * zoom, 0, Math.PI * 2);
          ctx.strokeStyle = '#f0b020';
          ctx.globalAlpha = 0.15 + Math.sin(_time * 2) * 0.08;
          ctx.lineWidth = 1.5 * zoom;
          ctx.setLineDash([3 * zoom, 3 * zoom]);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.globalAlpha = 1;
        }

        // Outer glow
        if ((isSelected || isHovered) && isHighlighted) {
          const gradient = ctx.createRadialGradient(sx, sy, r * 0.5, sx, sy, r * 3.5);
          gradient.addColorStop(0, color);
          gradient.addColorStop(1, 'transparent');
          ctx.beginPath();
          ctx.arc(sx, sy, r * 3.5, 0, Math.PI * 2);
          ctx.fillStyle = gradient;
          ctx.globalAlpha = isSelected ? 0.15 : 0.08;
          ctx.fill();
          ctx.globalAlpha = 1;
        }

        // Node body
        ctx.beginPath();
        ctx.arc(sx, sy, r, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.globalAlpha = alpha;
        ctx.fill();

        // Selection ring
        if (isSelected) {
          ctx.beginPath();
          ctx.arc(sx, sy, r + 3 * zoom, 0, Math.PI * 2);
          ctx.strokeStyle = color;
          ctx.globalAlpha = 0.7;
          ctx.lineWidth = 1.5 * zoom;
          ctx.stroke();
          ctx.globalAlpha = 1;
        }

        // Breathing pulse for active nodes
        if (node.status === 'active' || node.status === 'current' || node.status === 'open') {
          const pulse = Math.sin(_time * 1.5 + node.x * 0.01) * 0.5 + 0.5;
          ctx.beginPath();
          ctx.arc(sx, sy, r + pulse * 2 * zoom, 0, Math.PI * 2);
          ctx.strokeStyle = color;
          ctx.globalAlpha = 0.04 * alpha;
          ctx.lineWidth = 1 * zoom;
          ctx.stroke();
          ctx.globalAlpha = 1;
        }

        // Label
        if (zoom > 0.4 && isHighlighted) {
          const fontSize = Math.max(8, LABEL_FONT_SIZE * zoom);
          ctx.font = `500 ${fontSize}px 'JetBrains Mono', monospace`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'top';
          ctx.fillStyle = color;
          ctx.globalAlpha = alpha * (isSelected || isHovered ? 1 : 0.7);
          ctx.fillText(node.id, sx, sy + r + 4 * zoom);
          ctx.globalAlpha = 1;

          // Title (only when zoomed in enough or hovered)
          if ((zoom > 1.0 || isHovered || isSelected) && isHighlighted) {
            const titleSize = Math.max(7, 9 * zoom);
            ctx.font = `300 ${titleSize}px 'Outfit', sans-serif`;
            ctx.fillStyle = '#c0cee0';
            ctx.globalAlpha = alpha * 0.6;
            const maxW = 140 * zoom;
            let title = node.name;
            if (ctx.measureText(title).width > maxW) {
              while (title.length > 3 && ctx.measureText(title + '...').width > maxW) title = title.slice(0, -1);
              title += '...';
            }
            ctx.fillText(title, sx, sy + r + 4 * zoom + fontSize + 2);
            ctx.globalAlpha = 1;
          }
        }

        // Connection count badge
        if (zoom > 0.6 && node.connectionCount > 1 && isHighlighted) {
          const badgeR = Math.max(5, 7 * zoom);
          const bx = sx + r * 0.7, by = sy - r * 0.7;
          ctx.beginPath();
          ctx.arc(bx, by, badgeR, 0, Math.PI * 2);
          ctx.fillStyle = '#0b0f19';
          ctx.globalAlpha = alpha * 0.9;
          ctx.fill();
          ctx.beginPath();
          ctx.arc(bx, by, badgeR, 0, Math.PI * 2);
          ctx.strokeStyle = color;
          ctx.globalAlpha = alpha * 0.4;
          ctx.lineWidth = 1;
          ctx.stroke();
          ctx.font = `600 ${Math.max(7, 8 * zoom)}px 'JetBrains Mono', monospace`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillStyle = color;
          ctx.globalAlpha = alpha * 0.8;
          ctx.fillText(String(node.connectionCount), bx, by);
          ctx.globalAlpha = 1;
        }
      }

      // ── Cluster labels ──
      if (zoom < 1.5 && !hasHighlight) {
        const clusters = {};
        for (const n of nodes) {
          if (!activeTypes.has(n.type)) continue;
          if (!clusters[n.type]) clusters[n.type] = { sx: 0, sy: 0, count: 0 };
          clusters[n.type].sx += n.x;
          clusters[n.type].sy += n.y;
          clusters[n.type].count++;
        }
        for (const [type, c] of Object.entries(clusters)) {
          if (c.count < 2) continue;
          const cx = c.sx / c.count, cy = c.sy / c.count;
          const [sx, sy] = worldToScreen(cx, cy - 40 / zoom);
          ctx.font = `600 ${Math.max(8, 10 * zoom)}px 'JetBrains Mono', monospace`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillStyle = TYPE_COLORS[type];
          ctx.globalAlpha = 0.1;
          ctx.fillText(TYPE_LABELS[type].toUpperCase(), sx, sy);
          ctx.globalAlpha = 1;
        }
      }
    }

    // ═══════════════════════════════════════════
    //  MINIMAP
    // ═══════════════════════════════════════════

    const minimapCanvas = document.getElementById('minimap-canvas');
    const mctx = minimapCanvas.getContext('2d');

    function renderMinimap() {
      const el = document.getElementById('minimap');
      const mW = el.clientWidth, mH = el.clientHeight;
      const mdpr = window.devicePixelRatio || 1;
      minimapCanvas.width = mW * mdpr;
      minimapCanvas.height = mH * mdpr;
      mctx.setTransform(mdpr, 0, 0, mdpr, 0, 0);
      mctx.clearRect(0, 0, mW, mH);

      if (!nodes.length) return;

      // Find bounds
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      for (const n of nodes) {
        if (!activeTypes.has(n.type)) continue;
        if (n.x < minX) minX = n.x;
        if (n.x > maxX) maxX = n.x;
        if (n.y < minY) minY = n.y;
        if (n.y > maxY) maxY = n.y;
      }

      const pad = 40;
      minX -= pad; maxX += pad; minY -= pad; maxY += pad;
      const rangeX = maxX - minX || 1, rangeY = maxY - minY || 1;
      const scale = Math.min(mW / rangeX, mH / rangeY);
      const ox = (mW - rangeX * scale) / 2, oy = (mH - rangeY * scale) / 2;

      const mx = (x) => (x - minX) * scale + ox;
      const my = (y) => (y - minY) * scale + oy;

      // Links
      mctx.globalAlpha = 0.08;
      mctx.strokeStyle = '#4a5a74';
      mctx.lineWidth = 0.5;
      for (const link of links) {
        if (!activeTypes.has(link.source.type) || !activeTypes.has(link.target.type)) continue;
        mctx.beginPath();
        mctx.moveTo(mx(link.source.x), my(link.source.y));
        mctx.lineTo(mx(link.target.x), my(link.target.y));
        mctx.stroke();
      }

      // Nodes
      for (const n of nodes) {
        if (!activeTypes.has(n.type)) continue;
        mctx.beginPath();
        mctx.arc(mx(n.x), my(n.y), Math.max(1.5, n.radius * scale * 0.4), 0, Math.PI * 2);
        mctx.fillStyle = TYPE_COLORS[n.type];
        mctx.globalAlpha = n === selectedNode ? 1 : 0.5;
        mctx.fill();
      }
      mctx.globalAlpha = 1;

      // Viewport rectangle
      const tl = screenToWorld(0, 60);
      const br = screenToWorld(W, H - 60);
      const vx = mx(tl[0]), vy = my(tl[1]);
      const vw = (br[0] - tl[0]) * scale, vh = (br[1] - tl[1]) * scale;
      mctx.strokeStyle = 'rgba(61,142,207,0.5)';
      mctx.lineWidth = 1;
      mctx.strokeRect(vx, vy, vw, vh);
      mctx.fillStyle = 'rgba(61,142,207,0.04)';
      mctx.fillRect(vx, vy, vw, vh);
    }

    // ═══════════════════════════════════════════
    //  UI BUILDERS
    // ═══════════════════════════════════════════

    function buildUI() {
      buildFilters();
      buildStats();
      buildTimeline();
    }

    function buildFilters() {
      const el = document.getElementById('filters');
      el.innerHTML = '';
      const counts = {};
      for (const n of nodes) counts[n.type] = (counts[n.type] || 0) + 1;

      for (const [type, label] of Object.entries(TYPE_LABELS)) {
        const btn = document.createElement('button');
        btn.className = 'filter-btn active';
        btn.dataset.type = type;
        btn.innerHTML = `<span class="dot" style="background:${TYPE_COLORS[type]}"></span>${TYPE_SHORT[type]}<span class="count">${counts[type] || 0}</span>`;
        btn.addEventListener('click', () => {
          if (activeTypes.has(type)) { activeTypes.delete(type); btn.classList.remove('active'); }
          else { activeTypes.add(type); btn.classList.add('active'); }
          simAlpha = Math.max(simAlpha, 0.3);
        });
        el.appendChild(btn);
      }
    }

    function buildStats() {
      const el = document.getElementById('stats');
      const total = nodes.length;
      const linked = links.length;
      const stale = nodes.filter(n => n.isStale).length;
      const health = total > 0 ? Math.round((1 - stale / total) * 100) : 100;
      const healthColor = health > 80 ? '#00d68f' : health > 50 ? '#f0b020' : '#f04060';

      el.innerHTML = `
        <div class="st-title">${graphData.project || 'Brain'}</div>
        <div class="st-row"><span class="st-label">Entries</span><span class="st-val">${total}</span></div>
        <div class="st-row"><span class="st-label">Links</span><span class="st-val">${linked}</span></div>
        <div class="st-row"><span class="st-label">Stale</span><span class="st-val" style="color:${stale > 0 ? '#f0b020' : 'var(--text-dim)'}">${stale}</span></div>
        <div class="st-health">
          <div class="st-row"><span class="st-label">Health</span><span class="st-val" style="color:${healthColor}">${health}%</span></div>
          <div class="st-bar-track"><div class="st-bar" style="width:${health}%;background:${healthColor}"></div></div>
        </div>
      `;
    }

    function buildTimeline() {
      const el = document.getElementById('timeline');
      if (!nodes.length) { el.style.display = 'none'; return; }

      const dates = nodes.filter(n => n.date).map(n => new Date(n.date).getTime());
      if (!dates.length) { el.style.display = 'none'; return; }

      const minDate = Math.min(...dates), maxDate = Math.max(...dates);
      const range = maxDate - minDate || 1;

      let dotsHtml = '';
      for (const n of nodes) {
        if (!n.date) continue;
        const t = new Date(n.date).getTime();
        const pct = ((t - minDate) / range) * 100;
        dotsHtml += `<div class="tl-dot" data-id="${n.id}" style="left:${pct}%;background:${TYPE_COLORS[n.type]};opacity:${n.opacity}" title="${n.id}: ${n.name}"></div>`;
      }

      const fmt = (ts) => new Date(ts).toISOString().split('T')[0];
      el.innerHTML = `
        <div class="tl-header">
          <span class="tl-label">Timeline</span>
          <span class="tl-range">${fmt(minDate)} — ${fmt(maxDate)}</span>
        </div>
        <div class="tl-track">
          <div class="tl-line"></div>
          ${dotsHtml}
        </div>
      `;

      // Timeline dot clicks
      el.querySelectorAll('.tl-dot').forEach(dot => {
        dot.addEventListener('click', () => {
          const node = nodes.find(n => n.id === dot.dataset.id);
          if (node) { selectNode(node); focusNode(node); }
        });
      });
    }

    function showDetail(node) {
      const el = document.getElementById('detail');
      const color = TYPE_COLORS[node.type];
      const relLinks = links.filter(l => l.source.id === node.id || l.target.id === node.id);

      let connectionsHtml = '';
      for (const l of relLinks) {
        const other = l.source.id === node.id ? l.target : l.source;
        const rel = l.source.id === node.id ? (REL_STYLES[l.relType]?.label || l.relType) : ('← ' + (REL_STYLES[l.relType]?.label || l.relType));
        connectionsHtml += `
          <div class="d-conn" data-id="${other.id}">
            <span class="d-conn-dot" style="background:${TYPE_COLORS[other.type]}"></span>
            <span class="d-conn-rel">${rel}</span>
            <span class="d-conn-name">${other.id}: ${other.name}</span>
          </div>`;
      }

      const tagsHtml = (node.tags || []).map(t => `<span class="d-chip">${t}</span>`).join('');
      const filesHtml = (node.files || []).map(f => `<div class="d-file">${f}</div>`).join('');
      const staleHtml = node.isStale ? `<div class="d-stale-warn">&#9888; Not reviewed in ${node.daysSinceReview} days</div>` : '';

      el.innerHTML = `
        <div class="d-header">
          <span class="d-type-badge" style="color:${color};border-color:${color}30">${TYPE_SHORT[node.type]}</span>
          <button class="d-close" onclick="document.getElementById('detail').classList.remove('open');window._deselectNode()">&#215;</button>
        </div>
        ${staleHtml}
        <div class="d-title" style="color:${color}">${node.name}</div>
        <div class="d-id">${node.id} &middot; ${node.status} &middot; ${node.date || 'no date'}</div>
        <div class="d-meta">
          ${node.severity ? `<span class="d-chip" style="border-color:${color}30;color:${color}">${node.severity}</span>` : ''}
          ${tagsHtml}
        </div>
        ${node.files?.length ? `<div class="d-section">Files</div>${filesHtml}` : ''}
        ${relLinks.length ? `<div class="d-section">Connections (${relLinks.length})</div>${connectionsHtml}` : '<div class="d-section">No connections</div>'}
      `;

      el.classList.add('open');

      // Connection clicks navigate
      el.querySelectorAll('.d-conn').forEach(conn => {
        conn.addEventListener('click', () => {
          const n = nodes.find(n => n.id === conn.dataset.id);
          if (n) { selectNode(n); focusNode(n); }
        });
      });
    }

    // ═══════════════════════════════════════════
    //  INTERACTION
    // ═══════════════════════════════════════════

    function findNodeAt(sx, sy) {
      const [wx, wy] = screenToWorld(sx, sy);
      let closest = null, closestD = Infinity;
      for (let i = nodes.length - 1; i >= 0; i--) {
        const n = nodes[i];
        if (!activeTypes.has(n.type)) continue;
        const dx = n.x - wx, dy = n.y - wy;
        const d = Math.sqrt(dx * dx + dy * dy);
        const hitR = n.radius + 4 / zoom;
        if (d < hitR && d < closestD) { closest = n; closestD = d; }
      }
      return closest;
    }

    function setHighlight(node) {
      highlightSet.clear();
      if (!node) return;
      highlightSet.add(node.id);
      for (const l of links) {
        if (l.source.id === node.id) highlightSet.add(l.target.id);
        else if (l.target.id === node.id) highlightSet.add(l.source.id);
      }
    }

    function selectNode(node) {
      selectedNode = node;
      setHighlight(node);
      if (node) showDetail(node);
      else document.getElementById('detail').classList.remove('open');
    }

    window._deselectNode = () => { selectNode(null); };

    function focusNode(node) {
      targetPanX = node.x;
      targetPanY = node.y;
      targetZoom = Math.max(zoom, 1.5);
      smoothing = true;
    }

    // Mouse events
    canvas.addEventListener('mousedown', (e) => {
      if (e.button === 1 || spaceDown) {
        isPanning = true;
        panStart = { x: e.clientX, y: e.clientY, px: panX, py: panY };
        canvas.style.cursor = 'grabbing';
        e.preventDefault();
        return;
      }
      if (e.button !== 0) return;

      const n = findNodeAt(e.clientX, e.clientY);
      dragMoved = false;
      if (n) {
        dragNode = n;
        dragNode.pinned = true;
        dragStart = { x: e.clientX, y: e.clientY };
        isDragging = true;
        canvas.style.cursor = 'grabbing';
      } else {
        isPanning = true;
        panStart = { x: e.clientX, y: e.clientY, px: panX, py: panY };
        canvas.style.cursor = 'grabbing';
      }
    });

    canvas.addEventListener('mousemove', (e) => {
      if (isPanning && panStart) {
        const dx = (e.clientX - panStart.x) / zoom;
        const dy = (e.clientY - panStart.y) / zoom;
        panX = panStart.px - dx;
        panY = panStart.py - dy;
        smoothing = false;
        return;
      }
      if (isDragging && dragNode) {
        const [wx, wy] = screenToWorld(e.clientX, e.clientY);
        dragNode.x = wx;
        dragNode.y = wy;
        dragNode.vx = 0;
        dragNode.vy = 0;
        dragMoved = true;
        simAlpha = Math.max(simAlpha, 0.1);
        return;
      }

      const n = findNodeAt(e.clientX, e.clientY);
      if (n !== hoverNode) {
        hoverNode = n;
        canvas.style.cursor = n ? 'pointer' : (spaceDown ? 'grab' : 'crosshair');
        if (!selectedNode) setHighlight(n);
      }
    });

    canvas.addEventListener('mouseup', (e) => {
      if (isPanning) {
        isPanning = false;
        canvas.style.cursor = spaceDown ? 'grab' : 'crosshair';
        return;
      }
      if (isDragging && dragNode) {
        if (!dragMoved) {
          selectNode(dragNode);
        }
        dragNode.pinned = false;
        dragNode = null;
        isDragging = false;
        canvas.style.cursor = hoverNode ? 'pointer' : 'crosshair';
        return;
      }
      // Click on empty space
      if (!dragMoved && e.button === 0 && !isDragging) {
        selectNode(null);
      }
    });

    canvas.addEventListener('dblclick', (e) => {
      const n = findNodeAt(e.clientX, e.clientY);
      if (n) { selectNode(n); focusNode(n); }
    });

    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      const factor = e.deltaY > 0 ? 0.9 : 1.1;
      const newZoom = Math.max(0.1, Math.min(8, zoom * factor));

      // Zoom towards cursor: keep world point under cursor stationary
      const [wx, wy] = screenToWorld(e.clientX, e.clientY);
      zoom = newZoom;
      // After zoom change, the same screen point maps to a different world point
      // Adjust pan so that (wx, wy) still maps to the cursor position
      panX = wx - (e.clientX - W / 2) / zoom;
      panY = wy - (e.clientY - H / 2) / zoom;
      smoothing = false;
    }, { passive: false });

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (e.key === ' ') { spaceDown = true; canvas.style.cursor = 'grab'; e.preventDefault(); }
      if (e.key === 'Escape') {
        selectNode(null);
        document.getElementById('search').value = '';
        searchQuery = '';
        document.getElementById('search-results').classList.remove('open');
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
        e.preventDefault();
        document.getElementById('search').focus();
      }
    });
    document.addEventListener('keyup', (e) => {
      if (e.key === ' ') { spaceDown = false; canvas.style.cursor = hoverNode ? 'pointer' : 'crosshair'; }
    });

    // Search
    const searchInput = document.getElementById('search');
    const searchResults = document.getElementById('search-results');
    searchInput.addEventListener('input', () => {
      searchQuery = searchInput.value.trim();
      if (!searchQuery) {
        searchResults.classList.remove('open');
        setHighlight(selectedNode);
        return;
      }
      const q = searchQuery.toLowerCase();
      const matches = nodes.filter(n =>
        n.name.toLowerCase().includes(q) || n.id.toLowerCase().includes(q) ||
        (n.tags || []).some(t => t.toLowerCase().includes(q))
      ).slice(0, 12);

      if (matches.length) {
        searchResults.innerHTML = matches.map(n =>
          `<div class="sr-item" data-id="${n.id}">
            <span class="sr-dot" style="background:${TYPE_COLORS[n.type]}"></span>
            <span class="sr-id">${n.id}</span>
            <span class="sr-name">${n.name}</span>
          </div>`
        ).join('');
        searchResults.classList.add('open');

        // Highlight matching nodes
        highlightSet.clear();
        matches.forEach(m => highlightSet.add(m.id));

        searchResults.querySelectorAll('.sr-item').forEach(item => {
          item.addEventListener('click', () => {
            const n = nodes.find(n => n.id === item.dataset.id);
            if (n) {
              selectNode(n);
              focusNode(n);
              searchResults.classList.remove('open');
              searchInput.blur();
            }
          });
        });
      } else {
        searchResults.innerHTML = '<div style="padding:10px;font-size:11px;color:var(--text-dim)">No results</div>';
        searchResults.classList.add('open');
        highlightSet.clear();
      }
    });

    searchInput.addEventListener('blur', () => {
      setTimeout(() => searchResults.classList.remove('open'), 200);
    });

    // Export PNG
    document.getElementById('btn-export').addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = `brain-graph-${Date.now()}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    });

    // Reset view
    document.getElementById('btn-reset').addEventListener('click', () => {
      targetPanX = 0; targetPanY = 0; targetZoom = 1;
      smoothing = true;
      selectNode(null);
    });

    // Minimap click
    document.getElementById('minimap').addEventListener('click', (e) => {
      const rect = e.currentTarget.getBoundingClientRect();
      const mx = (e.clientX - rect.left) / rect.width;
      const my = (e.clientY - rect.top) / rect.height;

      // Convert minimap coords to world coords
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      for (const n of nodes) {
        if (!activeTypes.has(n.type)) continue;
        if (n.x < minX) minX = n.x;
        if (n.x > maxX) maxX = n.x;
        if (n.y < minY) minY = n.y;
        if (n.y > maxY) maxY = n.y;
      }
      const pad = 40;
      minX -= pad; maxX += pad; minY -= pad; maxY += pad;

      targetPanX = minX + mx * (maxX - minX);
      targetPanY = minY + my * (maxY - minY);
      smoothing = true;
    });

    // ═══════════════════════════════════════════
    //  RESIZE
    // ═══════════════════════════════════════════

    function resize() {
      dpr = window.devicePixelRatio || 1;
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
    }
    window.addEventListener('resize', resize);
    resize();

    // ═══════════════════════════════════════════
    //  MAIN LOOP
    // ═══════════════════════════════════════════

    let frameCount = 0;
    function loop() {
      simulate();
      render();
      frameCount++;
      if (frameCount % 10 === 0) renderMinimap();
      animFrame = requestAnimationFrame(loop);
    }

    loadData().then(() => {
      loop();
    }).catch(err => {
      document.body.innerHTML = `<div style="padding:40px;font-family:monospace;color:#f04060">
        <h2>Failed to load graph data</h2>
        <p>${err.message}</p>
        <p>Make sure .brain/index.json exists and the server is running.</p>
      </div>`;
    });
  })();
  </script>
</body>
</html>
